
  <ion-header collapse="condense" translucent="true">
    <ion-toolbar>
      <ion-title size="small">
      <div class="container" background-color="black">
        <ion-label class="title">
            Insta-branch
        </ion-label>
       <div class="perfil">
         <ion-grid>
           <ion-row>
             <ion-col>
              <ion-avatar *ngIf="userLogged|async as user">
              <ion-img src="user.photoURL" id="user-header-pic"></ion-img>
              <ion-popover trigger="user-header-pic">
                <ng-template>
                  <ion-list>
                    <ion-item (click)="cerrarSesion()">
                      <ion-label>
                        Cerrar Sesion
                      </ion-label>
                    </ion-item>
                  </ion-list>
                </ng-template>
              </ion-popover>
              </ion-avatar>
              <ion-label *ngIf="userLogged|async as user">{{user.displayName}}</ion-label>
            </ion-col>
          </ion-row>
         </ion-grid>
       </div>
      </div>
      </ion-title>
  </ion-toolbar>
</ion-header>
