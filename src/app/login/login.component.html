<ion-content>
  <div style="height: 100%; display: flex; align-items: center; justify-content: center;">
    <ion-card size="12">
      <ion-card-content>
          <ion-icon  class="img" icon="person-circle-outline"></ion-icon>
        <form>
            <ion-item lines="full">
              <ion-label position="floating">Email</ion-label>
              <ion-input type="text" required [(ngModel)]="usuario.email" name="user"></ion-input>
            </ion-item>
            <ion-item lines="full">
              <ion-label position="floating">Password</ion-label>
              <ion-input type="password" required [(ngModel)]="usuario.password" name="pass"></ion-input>
            </ion-item>
            <ion-row>
              <ion-col>
                <ion-button (click)="ingresar()" color="danger" expand="block">Ingresar</ion-button>
                <a class="small-text" [routerLink]="['/register']">¿No estás registrado?</a>
              </ion-col>
            </ion-row>
          </form>
      </ion-card-content>
    </ion-card>
  </div>
  </ion-content>
