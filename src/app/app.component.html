<ion-app>
  <ion-header>
      <ion-title>
        <div class="container" background-color="black">
          <ion-label>
            <h1>
              Instagram
            </h1>
          </ion-label>
          <div class="notificaciones">
            <ion-button color="warning" id="trigger-notificaciones">
              <ion-icon name="notifications-outline"></ion-icon>
            </ion-button>
            <ion-popover trigger="trigger-notificaciones" show-backdrop="false">
              <ng-template>
                <ion-list>
                  <ion-item>
                    <ion-row>
                      <ion-col size="3">
                        <ion-avatar>
                          <ion-img src="https://www.misfiestas.es/wp-content/uploads/2019/11/wwe-john-cena-cardboard-face-mask-product-image.jpg"></ion-img>
                        </ion-avatar>
                      </ion-col>
                      <ion-col size="9">
                        John Cena empezó a seguirte
                      </ion-col>
                    </ion-row>
                  </ion-item>
                  <ion-item>
                    <ion-row>
                      <ion-col size="3">
                        <ion-avatar>
                          <ion-img src="https://media.resources.festicket.com/image/600x600/center/top/filters:quality(70)/www/artists/Billie_Eilish_pic_.jpeg"></ion-img>
                        </ion-avatar>
                      </ion-col>
                      <ion-col size="9">
                        Bellie Eilish reaccionó a tu última publicación
                      </ion-col>
                    </ion-row>
                  </ion-item>
                  <ion-item>
                    <ion-row>
                      <ion-col size="3">
                        <ion-avatar>
                          <ion-img src="https://static.nuso.org/media/cache/71/23/712391a16cf08a7a8758df642a8f7225.jpg"></ion-img>
                        </ion-avatar>
                      </ion-col>
                      <ion-col size="9">
                        AMLO reaccionó a tu última publicación
                      </ion-col>
                    </ion-row>
                  </ion-item>
                </ion-list>
              </ng-template>
            </ion-popover>
          </div>
         <div class="perfil">
          <ion-avatar>
            <ion-img src="https://static01.nyt.com/images/2021/09/14/science/07CAT-STRIPES/07CAT-STRIPES-jumbo.jpg?quality=75&auto=webp" id="user-header-pic"></ion-img>
            <ion-popover trigger="user-header-pic">
              <ng-template>
                <ion-list>
                  <ion-item>
                    <ion-label>
                      Cerrar Sesion
                    </ion-label>
                  </ion-item>
                </ion-list>
              </ng-template>
            </ion-popover>
          </ion-avatar>
         </div>
        </div>
      </ion-title>
  </ion-header>

  <ion-content>
    
    <app-tabs></app-tabs>
    
  </ion-content>
</ion-app>
