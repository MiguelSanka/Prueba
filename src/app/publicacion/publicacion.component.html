<ion-content>
<ion-row>
    <ion-col size="4">
        <ion-button color="warning" [routerLink]="['/feed']" >Regresar</ion-button>
    </ion-col>
</ion-row>
<div style="height: 100%; display: flex; align-items: center; justify-content: center;">
    <ion-card>
        <ion-card-header>
            <ion-grid>
                <ion-row>
                    <ion-col size="11">
                        <strong> {{pub.index}} </strong>
                    </ion-col>
                    <ion-col size="1">
                        <ion-icon name="ellipsis-horizontal-outline"></ion-icon>
                    </ion-col>
                </ion-row>
            </ion-grid>
        </ion-card-header>
        <ion-card-content>
            <img src={{pub.src}} alt="" width="700px">
        </ion-card-content>
        <div>
            <ion-grid>
                <ion-row>
                    <!--iconos-->
                    <ion-col size="1">
                        <ion-icon name="heart-outline"></ion-icon>
                    </ion-col>
                    <ion-col size="1">
                        <ion-icon name="chatbubble-outline"></ion-icon>
                    </ion-col>
                    <ion-col size="1">
                        <ion-icon name="paper-plane-outline"></ion-icon>
                    </ion-col>
                    <ion-col size="1" offset="8">
                        <ion-icon name="bookmark-outline"></ion-icon>
                    </ion-col>
                </ion-row>
            </ion-grid>
        </div>
        <div class="comment-section">
            <ion-list>
                <ion-item>
                    <ion-input placeholder="Escribe un comentario" [(ngModel)]="comentario.texto"></ion-input>
                    <ion-button (click)="comentar()">
                        <ion-icon name="arrow-back-outline"></ion-icon>
                    </ion-button>
                </ion-item>
                <ion-item *ngFor="let comentario of comentarios">
                    <ion-col size="1">
                            <img src="comentario.usuarioFoto" class="fotoperfil" alt="">
                    </ion-col>
                    <ion-col>
                        <ion-label>
                            {{comentario.texto}}
                        </ion-label>
                    </ion-col>
                </ion-item>
            </ion-list>
    </div>
    </ion-card>
</div>
</ion-content>
