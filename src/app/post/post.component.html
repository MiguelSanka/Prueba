<ion-content>
<ion-grid>
    <ion-row>
        <ion-col size="12">
            <ion-card>
                <ion-card-content>
                    <form #F = "ngForm" (ngSubmit)="onSubmit(F)" ngNativeValidate>
                        <ion-label>Caption: </ion-label>
                        <ion-input name="firts" [(ngModel)]="caption" placeholder="Ejemplo: Aquí en el Tosticentro"></ion-input>
                        <ion-button type="submit" (click)="subirFoto()">Subir publicacion</ion-button>
                        <!-- 
                        <input type="file" accept=".png, .jpg, .jpeg" (change)="seleccionarImagen($event)" id="inputFile">
                        <label for="inputFile">
                            <ion-icon icon="camera" size="large"></ion-icon>
                        </label>
                        -->
                        <ion-button (click)="tomarFoto()">
                            abrir camara
                        </ion-button>
                    </form>
                </ion-card-content>
            </ion-card>
        </ion-col>
    </ion-row>
    <ion-row>
        <ion-col size="6">
            <img src="{{imagen}}">
        </ion-col>
    </ion-row>
</ion-grid>
</ion-content>
