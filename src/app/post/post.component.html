<ion-content>
<ion-grid>
    <ion-row>
        <ion-col size="12">
        <div  style="height: 100%; display: flex; align-items: center; justify-content: center;">
            <ion-card>
                <ion-card-content>
                    <form #F = "ngForm" (ngSubmit)="onSubmit(F)" ngNativeValidate>
                        <ion-label>Caption: </ion-label>
                        <ion-input name="firts" [(ngModel)]="caption" placeholder="Ejemplo: Aquí en el Tosticentro"></ion-input>
                        <ion-button type="submit" (click)="subirFoto()">Subir publicacion</ion-button>
                        <ion-button (click)="tomarFoto()">
                            abrir camara
                        </ion-button>
                    </form>
                </ion-card-content>
            </ion-card>
        </div>
        </ion-col>
    </ion-row>
    <ion-row>
        <ion-col>
            <img src="{{imagen}}" style="display:block; margin:auto; width: 50%">
        </ion-col>
    </ion-row>
</ion-grid>
</ion-content>
